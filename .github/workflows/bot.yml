name: Market News Bot (LINE)

on:
  schedule:
    - cron: "0 */2 * * *"   # รันทุก 2 ชั่วโมง (ประหยัด quota สูงสุด)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state.json
          key: bot-state-${{ github.run_id }}
          restore-keys: bot-state-

      - name: Run bot
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID:       ${{ secrets.LINE_USER_ID }}
          FINNHUB_TOKEN:      ${{ secrets.FINNHUB_TOKEN }}
        run: python bot.py

      - name: Save state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: bot-state-${{ github.run_id }}
